version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ticketrush-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ticketrush
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ticketrush-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ticketrush-backend
    restart: always
    depends_on:
      - db
      - redis
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: user
      DB_PASSWORD: password
      DB_NAME: ticketrush
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8080:8080"
    networks:
      - ticketrush-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: ticketrush-frontend
    restart: always
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://backend:8080
    ports:
      - "5173:5173"
    networks:
      - ticketrush-net

volumes:
  postgres_data:
networks:
  ticketrush-net:
    driver: bridge
